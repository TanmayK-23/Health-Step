spring.application.name=HealthStep
# MySQL Database Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/healthstep_db?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:healthuser}
spring.datasource.password=${DB_PASSWORD:simple}

# Driver
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate settings
spring.jpa.hibernate.ddl-auto=${DB_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# JWT
app.jwt.secret=${JWT_SECRET:CQ+I7K/BqKZbMXVua7BBeR+mtJXDvO4GoRb13P4WnlijjRgLzIJCp7iacD0cWyNk}
app.jwt.expMinutes=43200   
# 30 days

# CORS (adjust origin to your dev URL/file)
spring.web.cors.allowed-origins=*
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=Authorization,Content-Type