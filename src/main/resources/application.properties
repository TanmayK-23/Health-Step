spring.application.name=HealthStep
# Database Configuration (Defaults to H2 in-memory, overridden by DB_URL in production)
spring.datasource.url=${DB_URL:jdbc:h2:mem:healthstep_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

# Driver (Defaults to H2, overridden if DB_URL is MySQL)
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

# JPA / Hibernate settings
spring.jpa.hibernate.ddl-auto=${DB_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.H2Dialect}

# Enable H2 console for debugging (accessible at /h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
app.jwt.secret=${JWT_SECRET:CQ+I7K/BqKZbMXVua7BBeR+mtJXDvO4GoRb13P4WnlijjRgLzIJCp7iacD0cWyNk}
app.jwt.expMinutes=43200   
# 30 days

# CORS (adjust origin to your dev URL/file)
spring.web.cors.allowed-origins=*
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=Authorization,Content-Type